# Idep configuration
# Copy to ~/.config/idep/config.toml (preferred, XDG) or ~/.idep/config.toml
# Docs: https://idep.dev/docs/config
#
# Schema (required fields):
# [ai]
# backend  = "ollama" | "anthropic" | "huggingface" | "openai"
# model    = "<model-name>"
# endpoint = "<url>" (optional: ollama / openai-compat only)
# [ai.auth]
# api_key  = "..." (optional: anthropic / huggingface / openai; env fallback IDEP_API_KEY)

# ─── AI Backend ────────────────────────────────────────────────────────────────
#
# Pick one backend by setting [ai].backend.
# Switch anytime — no restart required (hot-reload watches this file).
#
# Supported values: "ollama" | "anthropic" | "huggingface" | "openai"
#
# ─── Ollama (local, no API key, fully offline) ─────────────────────────────────

[ai]
backend  = "ollama"
model    = "codellama:13b"
endpoint = "http://localhost:11434"

# Other models: deepseek-coder:6.7b, starcoder2:7b, mistral:7b
# Install a model: ollama pull codellama:13b

# ─── Anthropic ─────────────────────────────────────────────────────────────────
# [ai]
# backend = "anthropic"
# model   = "claude-haiku-4-5-20251001"   # fast + cheap, good for completions
# # model = "claude-sonnet-4-6"           # stronger, slower
#
# [ai.auth]
# api_key = "sk-ant-..."
# # Or set env var: IDEP_API_KEY=sk-ant-...

# ─── HuggingFace ───────────────────────────────────────────────────────────────
# [ai]
# backend = "huggingface"
# model   = "bigcode/starcoder2-15b"
# # endpoint = "http://localhost:8080"    # optional: local HF TGI server
#
# [ai.auth]
# api_key = "hf_..."

# ─── OpenAI-compatible (GPT-4o, Groq, Together, LM Studio, etc.) ───────────────
# [ai]
# backend  = "openai"
# model    = "gpt-4o-mini"
# endpoint = "https://api.openai.com/v1"
# # endpoint = "https://api.groq.com/openai/v1"
# # endpoint = "http://localhost:1234/v1"   # LM Studio
#
# [ai.auth]
# api_key = "sk-..."

# ─── Completion behaviour ──────────────────────────────────────────────────────

[completion]
debounce_ms   = 400     # delay before triggering completion after keypress
max_tokens    = 128     # max tokens per inline completion
stop_at_lines = 10      # don't complete past this many new lines

# ─── Indexer (codebase RAG) ────────────────────────────────────────────────────

[index]
enabled    = true
chunk_size = 512        # tokens per chunk
top_k      = 8          # chunks retrieved per query
persist    = true       # save index to ~/.idep/index/<project-hash>/

# ─── Editor ────────────────────────────────────────────────────────────────────

[editor]
tab_width   = 4
insert_tabs = false     # use spaces
theme       = "idep-dark"
