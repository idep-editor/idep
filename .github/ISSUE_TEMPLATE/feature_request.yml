name: "Feature request"
description: "Propose an enhancement for Idep"
labels: [enhancement]
title: "[feat] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting improvements! Be concise and specific.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What would you like to see?
      placeholder: "Add support for..."
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this valuable? Who benefits?
      placeholder: "This helps because..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Outline the solution, UX/API, and constraints.
      placeholder: "Expose a command..., Add config..., UI changes..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "We could also..."

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Related issues, links, or notes.
